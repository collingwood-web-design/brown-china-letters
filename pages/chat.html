<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<title>AI Assistant — Brown China Letters</title>
		<link rel="stylesheet" href="../assets/css/main.css" />
		<style>
			/* Keep type scale stable when iframe width changes */
			html { font-size: 12pt; }
		</style>

		<style>
			/* --- From chatbot_placeholder example + shell link --- */
			* {
				box-sizing: border-box;
			}

			html,
			body.chat-placeholder-page {
				margin: 0;
				padding: 0;
				height: 100%;
				font-family: Arial, Helvetica, sans-serif;
				background: #f4f6f8;
				color: #1f2933;
			}

			body.chat-placeholder-page {
				min-height: 100vh;
			}

			.chat-shell-link {
				/* leave room for the shell chevron button (index.html) */
				padding: 12px 24px 12px 76px;
				border-bottom: 1px solid #d9e2ec;
				background: #ffffff;
				font-size: 0.9rem;
			}

			.chat-shell-link a {
				color: #b07d44;
				text-decoration: none;
				font-weight: 600;
			}

			.chat-shell-link a:hover {
				text-decoration: underline;
			}

			.app-shell {
				display: flex;
				flex-direction: column;
				min-height: calc(100vh - 49px);
			}

			.chat-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
				padding: 20px 24px;
				border-bottom: 1px solid #d9e2ec;
				background: #ffffff;
			}

			.chat-header h1 {
				margin: 0;
				font-size: 1.5rem;
			}

			.subtitle {
				margin: 4px 0 0;
				color: #52606d;
				font-size: 0.95rem;
			}

			.status-pill {
				padding: 8px 12px;
				border-radius: 999px;
				background: #e6f4ea;
				color: #1e7a34;
				font-size: 0.9rem;
				font-weight: 600;
				white-space: nowrap;
			}

			.status-pill.busy {
				background: #fff8e6;
				color: #8a6d1b;
			}

			.status-pill.error {
				background: #fde8e8;
				color: #c81e1e;
			}

			.send-button:disabled {
				opacity: 0.55;
				cursor: not-allowed;
				transform: none;
			}

			.chat-main {
				display: flex;
				flex-direction: column;
				flex: 1;
				max-width: 1100px;
				width: 100%;
				margin: 0 auto;
				padding: 24px;
				gap: 20px;
			}

			.chat-history {
				flex: 1;
				overflow-y: auto;
				padding: 8px 4px 24px;
			}

			.message-row {
				display: flex;
				align-items: flex-start;
				gap: 12px;
				margin-bottom: 18px;
			}

			.message-row.user {
				flex-direction: row-reverse;
			}

			.avatar {
				min-width: 46px;
				height: 46px;
				border-radius: 50%;
				background: #ffffff;
				color: #000000;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 0.8rem;
				font-weight: 700;
				box-shadow:
					inset 0 0 0 1px rgba(0, 0, 0, 0.28),
					0 2px 10px rgba(0, 0, 0, 0.06);
			}

			.message-bubble {
				max-width: min(70%, 780px);
				padding: 14px 16px;
				border-radius: 3.75em;
				background: #ffffff;
				box-shadow:
					inset 0 0 0 1px rgba(0, 0, 0, 0.28),
					0 2px 10px rgba(0, 0, 0, 0.06);
				line-height: 1.5;
			}

			.message-row.user .message-bubble {
				background: #ffffff;
			}

			.message-bubble p {
				margin: 0;
				white-space: pre-wrap;
				word-break: break-word;
			}

			.chat-input-area {
				display: flex;
				align-items: flex-end;
				gap: 12px;
				padding: 16px;
				border: 1px solid #d9e2ec;
				border-radius: 18px;
				background: #ffffff;
				box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
			}

			.chat-input {
				flex: 1;
				resize: none;
				border: none;
				outline: none;
				font-size: 1rem;
				line-height: 1.5;
				min-height: 52px;
				max-height: 180px;
				background: transparent;
				color: #102a43;
				font-family: inherit;
			}

			.send-button {
				border: 0;
				border-radius: 3.75em;
				padding: 0 2.5em;
				height: 3.75em;
				line-height: 3.75em;
				background: transparent;
				box-shadow:
					inset 0 0 0 1px rgba(0, 0, 0, 0.28),
					0 2px 10px rgba(0, 0, 0, 0.06);
				color: #000000;
				font-size: 0.75rem;
				font-weight: 400;
				letter-spacing: 0.125em;
				text-transform: uppercase;
				cursor: pointer;
				transition: background-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out, color 0.2s ease-in-out, transform 0.2s ease;
				font-family: inherit;
			}

			.send-button:hover {
				box-shadow:
					inset 0 0 0 1px #b07d44,
					0 4px 14px rgba(0, 0, 0, 0.08);
				color: #b07d44;
			}

			.send-button:active {
				transform: translateY(1px);
			}

			@media screen and (max-width: 768px) {
				.chat-header {
					padding: 16px;
				}

				.chat-main {
					padding: 16px;
				}

				.message-bubble {
					max-width: 82%;
				}

				.chat-input-area {
					flex-direction: column;
					align-items: stretch;
				}

				.send-button {
					width: 100%;
				}

				.chat-shell-link {
					padding-left: 76px;
				}
			}
		</style>
	</head>

	<body class="chat-placeholder-page">
		<script src="../brown-china-api-client.js"></script>
<script>
  (function () {
    var API_BASE = "https://web-production-7ed4a.up.railway.app/";

    // Example: non-streaming reply — wire this to her "Send" button / form.
    function sendMessage(userText, priorMessages, agent) {
      return BrownChinaApi.postChatJson(API_BASE, {
        agent: agent || "narrator",
        message: userText,
        messages: priorMessages || [],
        stream: false
      }).then(function (data) {
        return data.reply;
      });
    }

    // Example: streaming — append each delta to her message bubble.
    function sendMessageStream(userText, priorMessages, agent, onDelta, onDone, onErr) {
      return BrownChinaApi.postChatStream(
        API_BASE,
        {
          agent: agent || "narrator",
          message: userText,
          messages: priorMessages || [],
          stream: true
        },
        {
          onDelta: function (chunk, fullSoFar) {
            if (onDelta) onDelta(chunk, fullSoFar);
          },
          onEnd: function (fullText) {
            if (onDone) onDone(fullText);
          },
          onError: function (msg) {
            if (onErr) onErr(msg);
          }
        }
      );
    }

    // Expose for her handlers, or delete and call the functions directly.
    window.BrownChinaExample = { sendMessage: sendMessage, sendMessageStream: sendMessageStream };
  })();
</script>
		<div class="chat-shell-link">
			<a href="story.html" target="site-content">← Back to Home Page</a>
		</div>

		<div class="app-shell">
			<header class="chat-header">
				<div>
					<h1>AI Assistant</h1>
					<p class="subtitle">Ask questions about the letters archive; each reply uses your full thread on this page.</p>
				</div>
				<div class="status-pill" id="chatStatusPill">Ready</div>
			</header>

			<main class="chat-main">
				<div class="chat-history" id="chatHistory">
				</div>

				<form class="chat-input-area" id="chatForm">
					<textarea
						id="userInput"
						class="chat-input"
						placeholder="Type your message here..."
						rows="1"
					></textarea>
					<button type="submit" class="send-button" id="chatSendButton">Send</button>
				</form>
			</main>
		</div>

		<script>
			(function () {
				const chatForm = document.getElementById("chatForm");
				const userInput = document.getElementById("userInput");
				const chatHistory = document.getElementById("chatHistory");
				const statusPill = document.getElementById("chatStatusPill");
				const sendButton = document.getElementById("chatSendButton");

				/** Prior turns only; current user text is sent in `message` on the wire. */
				const conversationHistory = [];

				let isSending = false;

				function setStatus(label, mode) {
					statusPill.textContent = label;
					statusPill.classList.remove("busy", "error");
					if (mode === "busy") statusPill.classList.add("busy");
					if (mode === "error") statusPill.classList.add("error");
				}

				function appendMessage(role, text) {
					const row = document.createElement("div");
					row.className = "message-row " + role;

					const avatar = document.createElement("div");
					avatar.className = "avatar";
					avatar.textContent = role === "user" ? "YOU" : "AI";

					const bubble = document.createElement("div");
					bubble.className = "message-bubble";

					const paragraph = document.createElement("p");
					paragraph.textContent = text;

					bubble.appendChild(paragraph);
					row.appendChild(avatar);
					row.appendChild(bubble);
					chatHistory.appendChild(row);

					chatHistory.scrollTop = chatHistory.scrollHeight;
					return { row: row, paragraph: paragraph };
				}

				function abortPendingTurn(userUi, aiUi) {
					if (aiUi && aiUi.row && aiUi.row.parentNode) aiUi.row.remove();
					if (userUi && userUi.row && userUi.row.parentNode) userUi.row.remove();
				}

				function autoResizeTextarea() {
					userInput.style.height = "auto";
					userInput.style.height = userInput.scrollHeight + "px";
				}

				function setSending(sending) {
					isSending = sending;
					sendButton.disabled = sending;
					userInput.disabled = sending;
					if (sending) setStatus("Thinking…", "busy");
				}

				userInput.addEventListener("input", autoResizeTextarea);

				chatForm.addEventListener("submit", function (event) {
					event.preventDefault();

					const message = userInput.value.trim();
					if (!message || isSending) return;
					if (!window.BrownChinaExample || !window.BrownChinaExample.sendMessageStream) {
						setStatus("Chat client missing", "error");
						return;
					}

					const priorForApi = conversationHistory.slice();
					const userUi = appendMessage("user", message);
					const aiUi = appendMessage("ai", "");

					userInput.value = "";
					userInput.style.height = "auto";
					setSending(true);

					let settled = false;

					function onFailure(msg) {
						if (settled) return;
						settled = true;
						abortPendingTurn(userUi, aiUi);
						setSending(false);
						setStatus(typeof msg === "string" ? msg : "Request failed", "error");
					}

					function onSuccess(fullText) {
						if (settled) return;
						settled = true;
						const text = fullText || "";
						aiUi.paragraph.textContent = text;
						conversationHistory.push({ role: "user", content: message });
						conversationHistory.push({ role: "assistant", content: text });
						setSending(false);
						setStatus("Ready", "ready");
						chatHistory.scrollTop = chatHistory.scrollHeight;
					}

					window.BrownChinaExample
						.sendMessageStream(
							message,
							priorForApi,
							"narrator",
							function (_chunk, fullSoFar) {
								aiUi.paragraph.textContent = fullSoFar || "";
								chatHistory.scrollTop = chatHistory.scrollHeight;
							},
							onSuccess,
							onFailure
						)
						.catch(function (err) {
							onFailure(err && err.message ? err.message : String(err));
						});
				});

				userInput.addEventListener("keydown", function (event) {
					if (event.key === "Enter" && !event.shiftKey) {
						event.preventDefault();
						chatForm.requestSubmit();
					}
				});
			})();
		</script>
	</body>
</html>
